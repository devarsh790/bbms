{% extends 'layout.html' %}

{% block body %}
<div class="jumbotron" style="background-color:#f7f7f7;">
  <h1>Add donor details here. </h1>
  <hr class="my-4">
  <form action="" method="POST">
    <div class="form-group">
      <label>Donor Name</label>
      <input type="text" name="dname" class="form-control" value="{{request.form.dname}}" required>
    </div>
    <div class="form-group">
      <label>Blood Group</label>
      <select name="b_group" class="form-control" required>
        <option value="" disabled {% if not request.form.b_group %}selected{% endif %}>Select Blood Group</option>
        <option value="A+" {% if request.form.b_group == 'A+' %}selected{% endif %}>A+</option>
        <option value="A-" {% if request.form.b_group == 'A-' %}selected{% endif %}>A-</option>
        <option value="B+" {% if request.form.b_group == 'B+' %}selected{% endif %}>B+</option>
        <option value="B-" {% if request.form.b_group == 'B-' %}selected{% endif %}>B-</option>
        <option value="AB+" {% if request.form.b_group == 'AB+' %}selected{% endif %}>AB+</option>
        <option value="AB-" {% if request.form.b_group == 'AB-' %}selected{% endif %}>AB-</option>
        <option value="O+" {% if request.form.b_group == 'O+' %}selected{% endif %}>O+</option>
        <option value="O-" {% if request.form.b_group == 'O-' %}selected{% endif %}>O-</option>
      </select>
    </div>
    <div class="form-group">
      <label>Sex</label>
      <select name="sex" class="form-control" required>
        <option value="" disabled {% if not request.form.sex %}selected{% endif %}>Select Sex</option>
        <option value="Male" {% if request.form.sex == 'Male' %}selected{% endif %}>Male</option>
        <option value="Female" {% if request.form.sex == 'Female' %}selected{% endif %}>Female</option>
        <option value="Other" {% if request.form.sex == 'Other' %}selected{% endif %}>Other</option>
      </select>
      <!-- <input type="radio" name="sex" value={{request.form.sex}}> Male<br>
      <input type="radio" name="sex" value={{request.form.sex}}> Female<br>
      <input type="radio" name="sex" value={{request.form.sex}}> Other -->
    </div>
    <div class="form-group">
      <label>Age</label>
      <input type="number" name="age" class="form-control" value="{{request.form.age}}">
    </div>
    <div class="form-group">
      <label>Weight</label>
      <input type="number" name="weight" class="form-control" value="{{request.form.weight}}">
    </div>
    <div class="form-group">
      <label>Address</label>
      <input type="text" name="address" class="form-control" value="{{request.form.address}}">
    </div>
    <div class="form-group">
      <label>Disease</label>
      <input type="text" name="disease" class="form-control" value="{{request.form.disease}}">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="demail" class="form-control" value="{{request.form.demail}}">
    </div>
    <div class="form-group">
      <label>Units Donated (Packets)</label>
      <input type="number" name="units" class="form-control" min="1" max="5" value="1" required>
      <small class="form-text text-muted">A single person can donate maximum 5 units.</small>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>

{% endblock %}
