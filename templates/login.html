{% extends 'layout.html' %}

{% block body %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="col-md-6 col-lg-5 mx-auto">
    <div class="card shadow-lg border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="fas fa-user-circle fa-3x text-primary mb-3"></i>
          <h2 class="font-weight-bold">Welcome Back</h2>
          <p class="text-muted">Login to manage your donations</p>
        </div>

        <form action="" method="POST">
          <div class="form-group">
            <label class="text-muted font-weight-bold">Email Address</label>
            <div class="input-group">
              <div class="input-group-prepend">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              </div>
              <input type="email" name="email" class="form-control form-control-lg" placeholder="Enter Email"
                value="{{request.form.email}}">
            </div>
          </div>
          <div class="form-group">
            <label class="text-muted font-weight-bold">Password</label>
            <div class="input-group">
              <div class="input-group-prepend">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
              </div>
              <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter Password"
                value="{{request.form.password}}">
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block mt-4">Login</button>
        </form>

        <div class="text-center mt-4">
          <p class="text-muted">Don't have an account? <a href="/register" class="font-weight-bold">Register here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
